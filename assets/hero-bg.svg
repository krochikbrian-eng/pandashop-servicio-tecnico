<svg viewBox="0 0 1600 760" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMaxYMid slice" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="glow" cx="74%" cy="32%" r="66%">
      <stop offset="0%" stop-color="#ffdcde"/>
      <stop offset="52%" stop-color="#fff2f2"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2.3" fill="#e4141b" fill-opacity="0.11"/>
    </pattern>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#c01016" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="760" fill="url(#glow)"/>
  <rect width="1600" height="760" fill="url(#dots)"/>
  <circle cx="1230" cy="300" r="320" fill="#fcd5d7" opacity="0.5"/>
  <circle cx="1520" cy="640" r="220" fill="#fcdcde" opacity="0.5"/>
  <circle cx="1480" cy="90"  r="150" fill="#fbcccf" opacity="0.45"/>

  <!-- faint tool/tech watermarks behind the text zone (very subtle) -->
  <g fill="none" stroke="#111" stroke-opacity="0.05" stroke-width="6">
    <circle cx="300" cy="180" r="50"/><path d="M270 180h60 M300 150v60"/>
    <rect x="170" y="520" width="120" height="80" rx="14"/>
    <circle cx="560" cy="120" r="34"/>
  </g>

  <!-- ===== Central: phone being repaired ===== -->
  <g transform="translate(60 0) rotate(-12 1180 380)" filter="url(#soft)">
    <rect x="1090" y="220" width="186" height="320" rx="32" fill="#111"/>
    <rect x="1105" y="239" width="156" height="282" rx="19" fill="#23262f"/>
    <rect x="1128" y="270" width="84" height="13" rx="6.5" fill="#e4141b"/>
    <rect x="1128" y="298" width="112" height="8" rx="4" fill="#5a5f6c"/>
    <rect x="1128" y="316" width="96" height="8" rx="4" fill="#5a5f6c"/>
    <circle cx="1183" cy="430" r="36" fill="#2f3340"/>
    <path d="M1167 430h32 M1183 414v32" stroke="#e4141b" stroke-width="6.5" stroke-linecap="round"/>
  </g>
  <g transform="rotate(36 1300 470)">
    <rect x="1291" y="470" width="18" height="112" rx="9" fill="#e4141b"/>
    <rect x="1296" y="438" width="9" height="36" fill="#111"/>
    <rect x="1297.5" y="412" width="6" height="28" fill="#555"/>
  </g>

  <!-- ===== Orbiting device badges (visible margins) ===== -->
  <!-- controller (top center-right) -->
  <g transform="translate(1330 150)">
    <circle r="52" fill="#fff" filter="url(#soft)"/>
    <g transform="translate(0 1)">
      <path d="M-32 -3C-34 4 -33 15 -26 15 -20 15 -16 8 -10 6 -6 4.5 -4 4 0 4 4 4 6 4.5 10 6 16 8 20 15 26 15 33 15 34 4 32 -3 30 -9 22 -10 14 -9 8 -8 4 -7 0 -7 -4 -7 -8 -8 -14 -9 -22 -10 -30 -9 -32 -3Z" fill="#111"/>
      <path d="M-21 2h12 M-15 -4v12" stroke="#fff" stroke-width="3.4" stroke-linecap="round"/>
      <circle cx="12" cy="3" r="3.2" fill="#e4141b"/><circle cx="19" cy="-3" r="3.2" fill="#23c483"/>
    </g>
  </g>
  <!-- drone (right upper) -->
  <g transform="translate(1520 360)">
    <circle r="52" fill="#fff" filter="url(#soft)"/>
    <g stroke="#111" stroke-width="6" stroke-linecap="round"><line x1="-24" y1="-18" x2="24" y2="18"/><line x1="24" y1="-18" x2="-24" y2="18"/></g>
    <circle cx="-24" cy="-18" r="10" fill="none" stroke="#111" stroke-width="5"/>
    <circle cx="24" cy="-18" r="10" fill="none" stroke="#111" stroke-width="5"/>
    <circle cx="-24" cy="18" r="10" fill="none" stroke="#111" stroke-width="5"/>
    <circle cx="24" cy="18" r="10" fill="none" stroke="#111" stroke-width="5"/>
    <rect x="-14" y="-11" width="28" height="22" rx="6" fill="#e4141b"/>
  </g>
  <!-- laptop (lower center-right) -->
  <g transform="translate(1290 640)">
    <circle r="52" fill="#fff" filter="url(#soft)"/>
    <rect x="-27" y="-22" width="54" height="36" rx="4" fill="#111"/>
    <rect x="-22" y="-17" width="44" height="26" rx="2" fill="#2f3340"/>
    <rect x="-19" y="-12" width="20" height="5" rx="2.5" fill="#e4141b"/>
    <path d="M-34 16h68l6 8h-80z" fill="#111"/>
  </g>
  <!-- headphones (far right lower) -->
  <g transform="translate(1545 600)">
    <circle r="52" fill="#fff" filter="url(#soft)"/>
    <path d="M-24 6a24 24 0 0 1 48 0" fill="none" stroke="#111" stroke-width="9" stroke-linecap="round"/>
    <rect x="-30" y="2" width="13" height="24" rx="6" fill="#e4141b"/>
    <rect x="17" y="2" width="13" height="24" rx="6" fill="#e4141b"/>
  </g>

  <rect width="1600" height="760" fill="url(#fade)"/>
</svg>
