<svg viewBox="0 0 1600 760" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMaxYMid slice" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="glow" cx="78%" cy="28%" r="60%">
      <stop offset="0%" stop-color="#ffe3e4"/>
      <stop offset="55%" stop-color="#fff4f4"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2.4" fill="#e4141b" fill-opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1600" height="760" fill="url(#glow)"/>
  <rect width="1600" height="760" fill="url(#dots)"/>

  <!-- big soft red blobs on the right -->
  <circle cx="1320" cy="150" r="260" fill="#fbd0d2" opacity="0.55"/>
  <circle cx="1500" cy="560" r="220" fill="#fcdcde" opacity="0.5"/>

  <!-- floating device outlines (subtle) -->
  <g stroke="#e4141b" stroke-opacity="0.22" stroke-width="4" fill="none">
    <rect x="1140" y="120" width="120" height="200" rx="22"/>
    <line x1="1170" y1="300" x2="1230" y2="300"/>
    <circle cx="1430" cy="300" r="60"/>
    <path d="M1410 300h40 M1430 280v40"/>
    <rect x="1280" y="470" width="180" height="110" rx="12"/>
    <path d="M1270 590h200"/>
  </g>
  <g fill="#111" fill-opacity="0.05">
    <circle cx="1430" cy="160" r="46"/>
    <rect x="1150" y="470" width="90" height="90" rx="18"/>
  </g>

  <!-- fade to white over the left where text sits -->
  <rect width="1600" height="760" fill="url(#fade)"/>
</svg>
