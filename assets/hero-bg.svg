<svg viewBox="0 0 1600 760" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMaxYMid slice" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="glow" cx="74%" cy="32%" r="66%">
      <stop offset="0%" stop-color="#ffdcde"/>
      <stop offset="52%" stop-color="#fff2f2"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2.3" fill="#e4141b" fill-opacity="0.11"/>
    </pattern>

    <!-- Marco metálico del celular -->
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#41464f"/>
      <stop offset="22%" stop-color="#23262d"/>
      <stop offset="50%" stop-color="#15181d"/>
      <stop offset="78%" stop-color="#23262d"/>
      <stop offset="100%" stop-color="#0c0e12"/>
    </linearGradient>
    <linearGradient id="frameEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b7079" stop-opacity="0.9"/>
      <stop offset="12%" stop-color="#2a2e36" stop-opacity="0"/>
      <stop offset="88%" stop-color="#2a2e36" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </linearGradient>
    <!-- Vidrio de pantalla -->
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b303b"/>
      <stop offset="55%" stop-color="#1b1f27"/>
      <stop offset="100%" stop-color="#0f1217"/>
    </linearGradient>
    <linearGradient id="glare" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="redbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5a5f"/>
      <stop offset="100%" stop-color="#d3101a"/>
    </linearGradient>
    <radialGradient id="redbtn" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#ff6a6f"/>
      <stop offset="60%" stop-color="#e4141b"/>
      <stop offset="100%" stop-color="#b00b12"/>
    </radialGradient>
    <!-- Destornillador -->
    <linearGradient id="shaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9aa0a9"/>
      <stop offset="35%" stop-color="#e9edf2"/>
      <stop offset="55%" stop-color="#c3c8d0"/>
      <stop offset="100%" stop-color="#7c828c"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5a5f"/>
      <stop offset="45%" stop-color="#e4141b"/>
      <stop offset="100%" stop-color="#a90a11"/>
    </linearGradient>
    <!-- Badges 3D -->
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f4f7"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3f48"/>
      <stop offset="100%" stop-color="#111418"/>
    </linearGradient>

    <!-- Badge tipo moneda 3D -->
    <radialGradient id="coin" cx="38%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="62%" stop-color="#fbfbfd"/>
      <stop offset="100%" stop-color="#e9ebf0"/>
    </radialGradient>
    <radialGradient id="coinHi" cx="36%" cy="26%" r="42%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dev" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d424b"/>
      <stop offset="55%" stop-color="#1c1f25"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </linearGradient>
    <linearGradient id="devLite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#54596300"/>
      <stop offset="0%" stop-color="#6a7079" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#6a7079" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lens" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#3a4150"/>
      <stop offset="70%" stop-color="#11141a"/>
      <stop offset="100%" stop-color="#05070a"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#7a1f24" flood-opacity="0.22"/>
    </filter>
    <filter id="dropPhone" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="34" stdDeviation="34" flood-color="#7a1f24" flood-opacity="0.28"/>
    </filter>
    <filter id="blurShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1600" height="760" fill="url(#glow)"/>
  <rect width="1600" height="760" fill="url(#dots)"/>
  <circle cx="1230" cy="300" r="320" fill="#fcd5d7" opacity="0.5"/>
  <circle cx="1520" cy="640" r="220" fill="#fcdcde" opacity="0.5"/>
  <circle cx="1480" cy="90"  r="150" fill="#fbcccf" opacity="0.45"/>

  <g fill="none" stroke="#111" stroke-opacity="0.05" stroke-width="6">
    <circle cx="300" cy="180" r="50"/><path d="M270 180h60 M300 150v60"/>
    <rect x="170" y="520" width="120" height="80" rx="14"/>
    <circle cx="560" cy="120" r="34"/>
  </g>

  <!-- ===== Sombra de contacto del celular ===== -->
  <ellipse cx="1150" cy="602" rx="155" ry="42" fill="#9a2a2f" opacity="0.22" filter="url(#blurShadow)"/>

  <!-- ===== Celular 3D con cambio de módulo ===== -->
  <g transform="translate(-40 0) rotate(-12 1180 380)">
    <!-- cuerpo / marco + internos visibles -->
    <g filter="url(#dropPhone)">
      <rect x="1086" y="214" width="196" height="336" rx="38" fill="url(#frame)"/>
      <rect x="1086" y="214" width="196" height="336" rx="38" fill="url(#frameEdge)"/>
      <!-- recess / internos -->
      <rect x="1100" y="228" width="168" height="308" rx="26" fill="#23272f"/>
      <rect x="1116" y="252" width="136" height="118" rx="10" fill="#2c313b"/>
      <rect x="1116" y="252" width="136" height="118" rx="10" fill="none" stroke="#3a414d" stroke-width="2"/>
      <rect x="1124" y="266" width="60" height="9" rx="4.5" fill="#e4141b" opacity="0.55"/>
      <rect x="1124" y="284" width="100" height="6" rx="3" fill="#3a414d"/>
      <rect x="1124" y="298" width="84" height="6" rx="3" fill="#343b45"/>
      <rect x="1116" y="384" width="92" height="64" rx="8" fill="#2c313b"/>
      <rect x="1116" y="384" width="92" height="64" rx="8" fill="none" stroke="#3a414d" stroke-width="2"/>
      <circle cx="1232" cy="416" r="20" fill="#2c313b"/>
      <circle cx="1232" cy="416" r="20" fill="none" stroke="#3a414d" stroke-width="2"/>
      <rect x="1116" y="460" width="136" height="64" rx="8" fill="#2c313b"/>
    </g>

    <!-- MÓDULO (pantalla) levantado: pivota en la base -->
    <g transform="rotate(-15 1184 528)" filter="url(#soft)">
      <rect x="1098" y="226" width="172" height="312" rx="27" fill="url(#frame)"/>
      <rect x="1100" y="228" width="168" height="308" rx="26" fill="url(#screen)"/>
      <path d="M1100 252 L1268 228 L1268 300 L1100 392 Z" fill="url(#glare)"/>
      <rect x="1158" y="241" width="52" height="11" rx="5.5" fill="#0a0c10"/>
      <circle cx="1224" cy="246" r="4.5" fill="#0a0c10"/>
      <rect x="1124" y="282" width="96" height="15" rx="7.5" fill="url(#redbar)"/>
      <rect x="1124" y="312" width="118" height="9" rx="4.5" fill="#535a66"/>
      <rect x="1124" y="330" width="100" height="9" rx="4.5" fill="#3f4651"/>
      <circle cx="1184" cy="430" r="33" fill="url(#redbtn)"/>
      <path d="M1184 416v28 M1170 430h28" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    </g>
    <!-- flex que une el módulo con la base -->
    <g transform="rotate(-15 1184 528)">
      <rect x="1168" y="516" width="32" height="26" rx="3" fill="#e0a52a"/>
      <rect x="1172" y="521" width="24" height="3" rx="1.5" fill="#c08f1f"/>
      <rect x="1172" y="528" width="24" height="3" rx="1.5" fill="#c08f1f"/>
      <rect x="1172" y="535" width="24" height="3" rx="1.5" fill="#c08f1f"/>
    </g>
  </g>

  <!-- ===== Destornillador 3D ===== -->
  <g transform="translate(-8 26) rotate(34 1300 470)">
    <rect x="1294.5" y="404" width="7" height="34" rx="2" fill="#6b7178"/>
    <rect x="1291" y="436" width="14" height="46" rx="3" fill="url(#shaft)"/>
    <rect x="1288" y="480" width="20" height="10" rx="3" fill="#2b2f36"/>
    <rect x="1286" y="488" width="24" height="120" rx="12" fill="url(#handle)"/>
    <rect x="1290" y="494" width="5" height="104" rx="2.5" fill="#ffffff" opacity="0.32"/>
    <ellipse cx="1298" cy="606" rx="12" ry="5" fill="#7d070d" opacity="0.6"/>
  </g>

  <!-- ===== Badges 3D flotantes (estilo moneda con relieve) ===== -->
  <!-- joystick / gamepad -->
  <g transform="translate(1330 150)">
    <circle r="52" fill="url(#coin)" filter="url(#soft)"/>
    <circle r="51" fill="url(#coinHi)"/>
    <circle r="52" fill="none" stroke="#fff" stroke-opacity="0.85" stroke-width="1.2"/>
    <g transform="translate(0 1)">
      <ellipse cx="0" cy="18" rx="27" ry="6" fill="#7a1f24" opacity="0.12"/>
      <path d="M-30 -6c-6 1-9 7-10 14-1 6-2 14 4 16 5 2 9-3 12-8 2-3 5-5 9-5h14c4 0 7 2 9 5 3 5 7 10 12 8 6-2 5-10 4-16-1-7-4-13-10-14-8-1-16 2-22 2s-14-3-22-2z" fill="url(#dev)"/>
      <path d="M-28 -4c-5 1-8 6-9 11 13-7 24-9 37-9s24 2 37 9c-1-5-4-10-9-11-7-1-13 2-19 2s-13-3-19-2z" fill="#ffffff" opacity="0.10"/>
      <path d="M-19 4h11 M-13.5 -1.5v11" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="14" cy="9" r="2.8" fill="#e4141b"/><circle cx="14" cy="-1" r="2.8" fill="#ffb100"/>
      <circle cx="9" cy="4" r="2.8" fill="#23c483"/><circle cx="19" cy="4" r="2.8" fill="#3aa0ff"/>
    </g>
  </g>
  <!-- drone -->
  <g transform="translate(1520 360)">
    <circle r="52" fill="url(#coin)" filter="url(#soft)"/>
    <circle r="51" fill="url(#coinHi)"/>
    <circle r="52" fill="none" stroke="#fff" stroke-opacity="0.85" stroke-width="1.2"/>
    <g transform="translate(0 1)">
      <line x1="-21" y1="-15" x2="21" y2="15" stroke="#2b2f37" stroke-width="6" stroke-linecap="round"/>
      <line x1="21" y1="-15" x2="-21" y2="15" stroke="#2b2f37" stroke-width="6" stroke-linecap="round"/>
      <g>
        <ellipse cx="-26" cy="-19" rx="13" ry="3.4" fill="#3a4150" opacity="0.85"/>
        <ellipse cx="26" cy="-19" rx="13" ry="3.4" fill="#3a4150" opacity="0.85"/>
        <ellipse cx="-26" cy="19" rx="13" ry="3.4" fill="#3a4150" opacity="0.85"/>
        <ellipse cx="26" cy="19" rx="13" ry="3.4" fill="#3a4150" opacity="0.85"/>
      </g>
      <circle cx="-26" cy="-19" r="5.5" fill="url(#dev)"/><circle cx="26" cy="-19" r="5.5" fill="url(#dev)"/>
      <circle cx="-26" cy="19" r="5.5" fill="url(#dev)"/><circle cx="26" cy="19" r="5.5" fill="url(#dev)"/>
      <rect x="-16" y="-13" width="32" height="26" rx="8" fill="url(#dev)"/>
      <circle cx="0" cy="6" r="6" fill="url(#lens)"/><circle cx="-2" cy="4" r="1.6" fill="#fff" opacity="0.5"/>
      <rect x="-9" y="-9" width="18" height="6" rx="3" fill="#e4141b"/>
    </g>
  </g>
  <!-- laptop -->
  <g transform="translate(1290 640)">
    <circle r="52" fill="url(#coin)" filter="url(#soft)"/>
    <circle r="51" fill="url(#coinHi)"/>
    <circle r="52" fill="none" stroke="#fff" stroke-opacity="0.85" stroke-width="1.2"/>
    <g transform="translate(0 -2)">
      <rect x="-27" y="-22" width="54" height="37" rx="5" fill="url(#dev)"/>
      <rect x="-27" y="-22" width="54" height="14" rx="5" fill="url(#devLite)"/>
      <rect x="-22" y="-17" width="44" height="27" rx="3" fill="#10131a"/>
      <rect x="-18" y="-12" width="22" height="5" rx="2.5" fill="#e4141b"/>
      <rect x="-18" y="-3" width="30" height="3.4" rx="1.7" fill="#3a414d"/>
      <rect x="-18" y="3" width="24" height="3.4" rx="1.7" fill="#2d333d"/>
      <path d="M-33 15h66l7 9q1 2-1 2h-78q-2 0-1-2z" fill="#1b1f27"/>
      <rect x="-9" y="17" width="18" height="3" rx="1.5" fill="#3a414d"/>
    </g>
  </g>
  <!-- auriculares -->
  <g transform="translate(1545 600)">
    <circle r="52" fill="url(#coin)" filter="url(#soft)"/>
    <circle r="51" fill="url(#coinHi)"/>
    <circle r="52" fill="none" stroke="#fff" stroke-opacity="0.85" stroke-width="1.2"/>
    <g transform="translate(0 2)">
      <path d="M-25 4a25 25 0 0 1 50 0" fill="none" stroke="url(#dev)" stroke-width="8" stroke-linecap="round"/>
      <path d="M-25 2a25 25 0 0 1 50 0" fill="none" stroke="#6a7079" stroke-width="2.4" stroke-linecap="round" opacity="0.5"/>
      <rect x="-31" y="2" width="15" height="26" rx="7" fill="url(#dev)"/>
      <rect x="16" y="2" width="15" height="26" rx="7" fill="url(#dev)"/>
      <rect x="-28" y="6" width="9" height="18" rx="4.5" fill="#e4141b"/>
      <rect x="19" y="6" width="9" height="18" rx="4.5" fill="#e4141b"/>
    </g>
  </g>

  <rect width="1600" height="760" fill="url(#fade)"/>
</svg>
