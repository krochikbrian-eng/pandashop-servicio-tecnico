<svg viewBox="0 0 360 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reparación de celular">
  <defs>
    <radialGradient id="mhalo" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#ffd9db" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#ffe9ea" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mframe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#41464f"/>
      <stop offset="48%" stop-color="#16191e"/>
      <stop offset="100%" stop-color="#0b0d11"/>
    </linearGradient>
    <linearGradient id="mscreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b303b"/>
      <stop offset="60%" stop-color="#1a1e26"/>
      <stop offset="100%" stop-color="#0f1217"/>
    </linearGradient>
    <linearGradient id="mglare" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="45%" stop-color="#fff" stop-opacity="0.03"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mredbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5a5f"/><stop offset="100%" stop-color="#d3101a"/>
    </linearGradient>
    <radialGradient id="mredbtn" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#ff6a6f"/><stop offset="60%" stop-color="#e4141b"/><stop offset="100%" stop-color="#b00b12"/>
    </radialGradient>
    <linearGradient id="mshaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9aa0a9"/><stop offset="40%" stop-color="#eef1f5"/><stop offset="60%" stop-color="#c3c8d0"/><stop offset="100%" stop-color="#7c828c"/>
    </linearGradient>
    <linearGradient id="mhandle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5a5f"/><stop offset="45%" stop-color="#e4141b"/><stop offset="100%" stop-color="#a90a11"/>
    </linearGradient>
    <linearGradient id="mbadge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f3f4f7"/>
    </linearGradient>
    <linearGradient id="mmetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3f48"/><stop offset="100%" stop-color="#111418"/>
    </linearGradient>
    <filter id="msoft" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#c01016" flood-opacity="0.2"/>
    </filter>
    <filter id="mphone" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#7a1f24" flood-opacity="0.32"/>
    </filter>
    <filter id="mblur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="11"/></filter>
  </defs>

  <!-- halo suave (sin recuadro, fondo transparente) -->
  <circle cx="180" cy="120" r="118" fill="url(#mhalo)"/>

  <!-- sombra de contacto -->
  <ellipse cx="180" cy="208" rx="84" ry="20" fill="#9a2a2f" opacity="0.2" filter="url(#mblur)"/>

  <!-- celular 3D -->
  <g transform="rotate(-9 180 120)" filter="url(#mphone)">
    <rect x="128" y="40" width="104" height="170" rx="22" fill="url(#mframe)"/>
    <rect x="136" y="48" width="88" height="154" rx="15" fill="url(#mscreen)"/>
    <path d="M136 62 L224 48 L224 90 L136 136 Z" fill="url(#mglare)"/>
    <rect x="166" y="54" width="28" height="6" rx="3" fill="#0a0c10"/>
    <rect x="150" y="78" width="56" height="9" rx="4.5" fill="url(#mredbar)"/>
    <rect x="150" y="95" width="68" height="6" rx="3" fill="#535a66"/>
    <rect x="150" y="107" width="56" height="6" rx="3" fill="#3f4651"/>
    <circle cx="180" cy="154" r="26" fill="#1d222b"/>
    <circle cx="180" cy="154" r="19" fill="url(#mredbtn)"/>
    <path d="M180 145v18 M171 154h18" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/>
  </g>

  <!-- destornillador 3D -->
  <g transform="rotate(40 252 158)">
    <rect x="248.5" y="104" width="5" height="22" rx="1.6" fill="#6b7178"/>
    <rect x="246" y="124" width="10" height="34" rx="2.4" fill="url(#mshaft)"/>
    <rect x="244" y="156" width="14" height="8" rx="2.4" fill="#2b2f36"/>
    <rect x="243" y="162" width="16" height="78" rx="8" fill="url(#mhandle)"/>
    <rect x="246" y="167" width="3.5" height="68" rx="1.8" fill="#fff" opacity="0.32"/>
  </g>

  <!-- badge engranaje -->
  <g transform="translate(286 176)">
    <circle r="30" fill="url(#mbadge)" filter="url(#msoft)"/>
    <g fill="url(#mmetal)" transform="scale(0.92)">
      <path d="M0 -19 4 -17 6 -22 11 -20 10 -15 14 -13 18 -16 21 -12 17 -9 18 -4 23 -4 23 2 18 3 17 8 21 11 18 15 14 13 10 16 11 21 6 22 4 18 0 19 -4 18 -6 22 -11 20 -10 15 -14 13 -18 16 -21 12 -17 9 -18 4 -23 4 -23 -2 -18 -3 -17 -8 -21 -11 -18 -15 -14 -13 -10 -16 -11 -21 -6 -22 -4 -18 0 -19Z"/>
    </g>
    <circle r="8.5" fill="#fff"/>
    <circle r="4" fill="#e4141b"/>
  </g>
</svg>
