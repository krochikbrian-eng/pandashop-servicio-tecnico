<svg viewBox="18 0 360 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reparación de celular y tablet">
  <defs>
    <radialGradient id="mhalo" cx="50%" cy="44%" r="58%">
      <stop offset="0%" stop-color="#ffd9db" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ffe9ea" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mframe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#41464f"/><stop offset="48%" stop-color="#16191e"/><stop offset="100%" stop-color="#0b0d11"/>
    </linearGradient>
    <linearGradient id="mscreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b303b"/><stop offset="60%" stop-color="#1a1e26"/><stop offset="100%" stop-color="#0f1217"/>
    </linearGradient>
    <linearGradient id="tscreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#30353f"/><stop offset="60%" stop-color="#1d2129"/><stop offset="100%" stop-color="#11141a"/>
    </linearGradient>
    <linearGradient id="mglare" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.2"/><stop offset="45%" stop-color="#fff" stop-opacity="0.03"/><stop offset="60%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mredbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5a5f"/><stop offset="100%" stop-color="#d3101a"/>
    </linearGradient>
    <radialGradient id="mredbtn" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#ff6a6f"/><stop offset="60%" stop-color="#e4141b"/><stop offset="100%" stop-color="#b00b12"/>
    </radialGradient>
    <linearGradient id="mshaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9aa0a9"/><stop offset="40%" stop-color="#eef1f5"/><stop offset="60%" stop-color="#c3c8d0"/><stop offset="100%" stop-color="#7c828c"/>
    </linearGradient>
    <linearGradient id="mhandle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5a5f"/><stop offset="45%" stop-color="#e4141b"/><stop offset="100%" stop-color="#a90a11"/>
    </linearGradient>
    <filter id="mphone" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="11" stdDeviation="11" flood-color="#5e1418" flood-opacity="0.34"/>
    </filter>
    <filter id="mtab" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#5e1418" flood-opacity="0.28"/>
    </filter>
    <filter id="mblur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="7"/></filter>
    <clipPath id="phScr"><rect x="136" y="48" width="78" height="154" rx="14"/></clipPath>
    <style>
      .float-a{animation:floatA 3.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .float-b{animation:floatB 4.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .screw{animation:wiggle 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 12%}
      .pulse{animation:pulse 2.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
      .scan{animation:scan 2.8s ease-in-out infinite}
      .spark{animation:spark 2.6s ease-in-out infinite}
      .spark.b{animation-delay:1.1s}
      .spark.c{animation-delay:.6s}
      @keyframes floatA{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
      @keyframes floatB{0%,100%{transform:translateY(-3px)}50%{transform:translateY(6px)}}
      @keyframes wiggle{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(5deg)}}
      @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.12);opacity:.92}}
      @keyframes scan{0%{transform:translateY(0);opacity:0}15%{opacity:.5}50%{transform:translateY(120px);opacity:.5}65%{opacity:0}100%{opacity:0}}
      @keyframes spark{0%,100%{opacity:0;transform:scale(.4)}45%{opacity:1;transform:scale(1)}}
      @media(prefers-reduced-motion:reduce){.float-a,.float-b,.screw,.pulse,.scan,.spark{animation:none}}
    </style>
  </defs>

  <circle cx="178" cy="126" r="124" fill="url(#mhalo)"/>

  <!-- TABLET (atras, derecha) -->
  <g class="float-b">
    <ellipse cx="266" cy="206" rx="58" ry="15" fill="#9a2a2f" opacity="0.16" filter="url(#mblur)"/>
    <g transform="rotate(8 262 130)" filter="url(#mtab)">
      <rect x="220" y="74" width="92" height="120" rx="13" fill="url(#mframe)"/>
      <rect x="221.2" y="75.2" width="89.6" height="117.6" rx="11.8" fill="none" stroke="#6b7079" stroke-width="1.3" opacity="0.5"/>
      <rect x="227" y="81" width="78" height="106" rx="8" fill="url(#tscreen)"/>
      <path d="M227 92 L305 81 L305 112 L227 140 Z" fill="url(#mglare)"/>
      <rect x="236" y="100" width="40" height="7" rx="3.5" fill="url(#mredbar)"/>
      <rect x="236" y="114" width="56" height="5" rx="2.5" fill="#535a66"/>
      <rect x="236" y="124" width="48" height="5" rx="2.5" fill="#3f4651"/>
      <rect x="236" y="150" width="60" height="5" rx="2.5" fill="#2d333d"/>
      <rect x="236" y="160" width="44" height="5" rx="2.5" fill="#2d333d"/>
    </g>
  </g>

  <!-- CELULAR (adelante, izquierda) -->
  <g class="float-a">
    <ellipse cx="150" cy="214" rx="74" ry="18" fill="#9a2a2f" opacity="0.2" filter="url(#mblur)"/>
    <g transform="rotate(-9 150 124)" filter="url(#mphone)">
      <rect x="108" y="44" width="104" height="170" rx="22" fill="url(#mframe)"/>
      <rect x="109.3" y="45.3" width="101.4" height="167.4" rx="20.8" fill="none" stroke="#6b7079" stroke-width="1.4" opacity="0.55"/>
      <rect x="113" y="60" width="3" height="138" rx="1.5" fill="#fff" opacity="0.13"/>
      <rect x="116" y="52" width="88" height="154" rx="15" fill="url(#mscreen)"/>
      <g clip-path="url(#phScr)" transform="translate(-20 0)">
        <rect class="scan" x="136" y="48" width="78" height="22" fill="#ff5a5f" opacity="0"/>
      </g>
      <path d="M116 66 L204 52 L204 94 L116 140 Z" fill="url(#mglare)"/>
      <rect x="146" y="58" width="28" height="6" rx="3" fill="#0a0c10"/>
      <rect x="130" y="82" width="56" height="9" rx="4.5" fill="url(#mredbar)"/>
      <rect x="130" y="99" width="68" height="6" rx="3" fill="#535a66"/>
      <rect x="130" y="111" width="56" height="6" rx="3" fill="#3f4651"/>
      <g class="pulse">
        <circle cx="160" cy="158" r="26" fill="#1d222b"/>
        <circle cx="160" cy="158" r="19" fill="url(#mredbtn)"/>
        <path d="M160 149v18 M151 158h18" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <!-- DESTORNILLADOR animado -->
  <g class="screw" transform="rotate(40 222 150)">
    <rect x="218.5" y="96" width="5" height="22" rx="1.6" fill="#6b7178"/>
    <rect x="216" y="116" width="10" height="34" rx="2.4" fill="url(#mshaft)"/>
    <rect x="214" y="148" width="14" height="8" rx="2.4" fill="#2b2f36"/>
    <rect x="213" y="154" width="16" height="78" rx="8" fill="url(#mhandle)"/>
    <rect x="216" y="159" width="3.5" height="68" rx="1.8" fill="#fff" opacity="0.32"/>
  </g>

  <!-- destellos -->
  <g fill="#e4141b">
    <path class="spark" d="M70 70l3 7 7 3-7 3-3 7-3-7-7-3 7-3z"/>
    <path class="spark b" d="M300 150l2.5 6 6 2.5-6 2.5-2.5 6-2.5-6-6-2.5 6-2.5z"/>
    <path class="spark c" d="M120 30l2 5 5 2-5 2-2 5-2-5-5-2 5-2z"/>
  </g>
</svg>
