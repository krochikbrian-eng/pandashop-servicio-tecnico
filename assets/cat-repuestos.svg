<svg viewBox="0 0 420 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Repuestos de celulares y tablets">
  <defs><clipPath id="rp"><rect width="420" height="280" rx="20"/></clipPath></defs>
  <g clip-path="url(#rp)">
    <rect width="420" height="280" fill="#f5f6f8"/>
    <circle cx="80" cy="70" r="90" fill="#eef0f4"/>
    <!-- phone back (frame) -->
    <g transform="rotate(-12 180 130)">
      <rect x="118" y="50" width="120" height="170" rx="20" fill="#111"/>
      <rect x="130" y="64" width="96" height="142" rx="12" fill="#2b2f3a"/>
      <circle cx="150" cy="84" r="7" fill="#e4141b"/>
      <circle cx="150" cy="104" r="7" fill="#444"/>
    </g>
    <!-- detached screen -->
    <g transform="rotate(8 290 140)">
      <rect x="252" y="60" width="110" height="160" rx="18" fill="#fff" stroke="#d9dde4" stroke-width="3"/>
      <rect x="266" y="74" width="82" height="132" rx="9" fill="#e9ecf1"/>
    </g>
    <!-- battery -->
    <rect x="250" y="196" width="58" height="30" rx="6" fill="#23c483" transform="rotate(8 279 211)"/>
    <rect x="0" y="232" width="420" height="48" fill="#111"/>
    <text x="24" y="263" fill="#fff" font-family="Plus Jakarta Sans,Arial" font-weight="800" font-size="20">Repuestos</text>
  </g>
</svg>
